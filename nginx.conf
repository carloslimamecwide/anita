server {
    listen 80;
    server_name mariscosdaanita.webfusionlab.pt;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mariscosdaanita.webfusionlab.pt;

    ssl_certificate /etc/letsencrypt/live/mariscosdaanita.webfusionlab.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mariscosdaanita.webfusionlab.pt/privkey.pem;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
