services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/cloudflare/webfusionlab.pt/cert.pem:/etc/cloudflare/cert.pem:ro
      - /etc/cloudflare/webfusionlab.pt/key.pem:/etc/cloudflare/key.pem:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/carloslimamecwide/anita:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  web:
