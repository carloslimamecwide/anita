services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/cloudflare/webfusionlab.pt/cert.pem:/etc/cloudflare/cert.pem:ro
      - /etc/cloudflare/webfusionlab.pt/key.pem:/etc/cloudflare/key.pem:ro
    depends_on:
      - web
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"

  web:
    image: ghcr.io/carloslimamecwide/anita:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

networks:
  web:
